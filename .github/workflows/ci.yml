name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # GUI-free deps are enough: renderer, folder search and settings
          # import no Qt, so the test suite runs without PySide6.
          python -m pip install \
            "markdown-it-py[linkify]>=3.0,<4" \
            "mdit-py-plugins>=0.4,<1" \
            "Pygments>=2.17,<3" \
            "pytest>=8.0,<9" \
            "ruff>=0.6"

      - name: Lint
        run: ruff check app tests

      - name: Test
        run: pytest -q
