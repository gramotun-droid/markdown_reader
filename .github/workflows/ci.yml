name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # GUI-free deps are enough: renderer, folder search and settings
          # import no Qt, so the test suite runs without PySide6.
          python -m pip install \
            "markdown-it-py[linkify]>=3.0,<4" \
            "mdit-py-plugins>=0.4,<1" \
            "Pygments>=2.17,<3" \
            "python-docx>=1.1,<2" \
            "pytest>=8.0,<9" \
            "ruff>=0.6"

      - name: Lint
        run: ruff check app tests

      - name: Test
        run: pytest -q

  build-windows:
    # Build a ready-to-run Windows bundle. Skipped on PRs to save CI minutes;
    # runs on pushes to main, on version tags, and on manual dispatch.
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build editor frontend (gravity-ui)
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build exe
        run: pyinstaller mdreader.spec

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: |
          $ver = "${{ github.ref_name }}"
          if ($ver -match '^v(.+)$') { $ver = $Matches[1] } else { $ver = '0.0.0-dev' }
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc /DMyAppVersion=$ver installer\mdreader.iss

      - name: Package portable bundle
        run: Compress-Archive -Path dist/MdReader/* -DestinationPath MdReader-windows.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MdReader-windows
          path: |
            MdReader-windows.zip
            installer_output/MdReader-Setup.exe
          if-no-files-found: error

      - name: Publish release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}"
          MdReader-windows.zip
          installer_output/MdReader-Setup.exe
          --title "MD Reader ${{ github.ref_name }}"
          --notes "Windows build of MD Reader ${{ github.ref_name }}. Either run the MdReader-Setup.exe installer, or unzip MdReader-windows.zip and run MdReader.exe."
